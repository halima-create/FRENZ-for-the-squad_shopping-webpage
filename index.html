<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>FRENZ | Streetwear for the Squad - Indian Fashion Hub</title>
    <meta
      name="description"
      content="FRENZ - Trendy streetwear, drippiest prices in India. Shop hoodies, sneakers, cargo, and more for the squad."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ========== HEADER ========== -->
    <header class="header">
      <div class="container">
        <div class="logo">
          <h1>FRENZ<span class="dot">.</span></h1>
          <span class="tag">for the squad</span>
        </div>

        <nav class="nav-links" id="navLinks">
          <ul>
            <li><a href="#" data-page="home" class="active-nav">Home</a></li>
            <li><a href="#" data-page="shop">Shop</a></li>
            <li><a href="#" data-page="new">New Arrivals</a></li>
            <li><a href="#" data-page="street">Street Culture</a></li>
            <li><a href="#" data-page="sale">Sale 🔥</a></li>
          </ul>
        </nav>

        <div class="icons">
          <i class="fas fa-search" id="searchIcon"></i>
          <div class="icon-wrapper">
            <i class="far fa-heart" id="wishlistIcon"></i>
            <span class="badge wishlist-badge" id="wishlistBadge">0</span>
          </div>
          <div class="icon-wrapper">
            <i class="fas fa-bag-shopping" id="cartIcon"></i>
            <span class="badge cart-badge" id="cartBadge">0</span>
          </div>
          <i class="fas fa-user-circle" id="userIcon"></i>
          <i class="fas fa-bars menu-btn" id="menuBtn"></i>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="search-bar" id="searchBar">
        <i class="fas fa-search"></i>
        <input
          type="text"
          id="searchInput"
          placeholder="Search hoodies, sneakers, tees, cargos..."
        />
        <button id="searchBtn">Search</button>
      </div>
    </header>

    <!-- ========== MAIN CONTENT ========== -->
    <main id="app"></main>

    <!-- ========== CART SIDEBAR ========== -->
    <div class="cart-sidebar" id="cartSidebar">
      <div class="sidebar-head">
        <h3><i class="fas fa-bag-shopping"></i> Your Bag</h3>
        <i class="fas fa-times" id="closeCart"></i>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-bottom">
        <div class="cart-summary">
          <span>Subtotal</span>
          <span class="cart-total" id="cartTotal">₹0</span>
        </div>
        <div class="delivery-note">Free delivery on orders above ₹999</div>
        <button class="checkout" id="checkoutBtn">Checkout →</button>
      </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="toast" class="toast">Added to bag ✨</div>

    <script src="app.js"></script>
  </body>
</html>
